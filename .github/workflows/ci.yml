name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
