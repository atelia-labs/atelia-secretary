name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    uses: atelia-labs/.github/.github/workflows/reusable-rust-ci.yml@5934886a87c0e09edfa8d9d6d019d8ce0b63afba

  beta-release-gates:
    name: Beta Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-features

      - name: Docker build
        run: docker build --file Dockerfile .

  dependency-review:
    name: Dependency Review
    uses: atelia-labs/.github/.github/workflows/reusable-dependency-review.yml@5934886a87c0e09edfa8d9d6d019d8ce0b63afba
