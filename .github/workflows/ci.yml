name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    uses: atelia-labs/.github/.github/workflows/reusable-rust-ci.yml@main

  dependency-review:
    name: Dependency Review
    uses: atelia-labs/.github/.github/workflows/reusable-dependency-review.yml@main
