name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    uses: atelia-labs/.github/.github/workflows/reusable-rust-ci.yml@5934886a87c0e09edfa8d9d6d019d8ce0b63afba

  beta-release-gates:
    name: Beta Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-features

      - name: Docker build
        run: docker build --file Dockerfile --tag atelia-secretary-beta-gate .

      - name: Docker smoke
        run: |
          cleanup() {
            docker logs atelia-secretary-beta-gate || true
            docker rm --force atelia-secretary-beta-gate || true
          }
          trap cleanup EXIT

          docker run --detach --name atelia-secretary-beta-gate \
            --env ATELIA_DAEMON_LISTEN_ADDR=0.0.0.0:8080 \
            --env ATELIA_DAEMON_UNSAFE_ALLOW_NON_LOOPBACK_LISTEN=1 \
            --publish 127.0.0.1::8080 \
            atelia-secretary-beta-gate
          auth_token=""
          for attempt in $(seq 1 20); do
            auth_token="$(docker exec atelia-secretary-beta-gate sh -lc 'cat /home/atelia/.atelia-secretary/daemon-auth.token' 2>/dev/null || true)"
            if [ -n "$auth_token" ]; then
              break
            fi
            sleep 1
          done
          test -n "$auth_token"
          host_port="$(docker port atelia-secretary-beta-gate 8080/tcp | sed -n 's/.*://p' | head -n1)"
          sleep 2
          healthy=0
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error \
              -H "Authorization: Bearer ${auth_token}" \
              "http://127.0.0.1:${host_port}/v1/health" >/dev/null; then
              healthy=1
              break
            fi
            sleep 1
          done
          test "$healthy" = "1"

  dependency-review:
    name: Dependency Review
    uses: atelia-labs/.github/.github/workflows/reusable-dependency-review.yml@5934886a87c0e09edfa8d9d6d019d8ce0b63afba
