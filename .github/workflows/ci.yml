name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    uses: atelia-labs/.github/.github/workflows/reusable-rust-ci.yml@main

  beta-release-gates:
    name: Beta Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Docker build
        run: docker build --file Dockerfile .

  dependency-review:
    name: Dependency Review
    uses: atelia-labs/.github/.github/workflows/reusable-dependency-review.yml@main
