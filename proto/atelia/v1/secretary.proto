syntax = "proto3";

package atelia.v1;

service SecretaryService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc RegisterRepository(RegisterRepositoryRequest) returns (RegisterRepositoryResponse);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc GetProjectStatus(GetProjectStatusRequest) returns (GetProjectStatusResponse);
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc WatchEvents(WatchEventsRequest) returns (stream WatchEventsResponse);
  rpc CheckPolicy(CheckPolicyRequest) returns (CheckPolicyResponse);
  rpc RenderToolOutput(RenderToolOutputRequest) returns (RenderToolOutputResponse);
}

message HealthRequest {}

message HealthResponse {
  // Kept as a string for compatibility with the initial protocol.
  string status = 1;
  string daemon_version = 2;
  string protocol_version = 3;
  string storage_version = 4;
  StorageStatus storage_status = 5;
  DaemonStatus daemon_status = 6;
  repeated string capabilities = 7;
}

message ProtocolMetadata {
  string protocol_version = 1;
  string daemon_version = 2;
  string storage_version = 3;
  repeated string capabilities = 4;
}

enum DaemonStatus {
  DAEMON_STATUS_UNSPECIFIED = 0;
  DAEMON_STATUS_STARTING = 1;
  DAEMON_STATUS_READY = 2;
  DAEMON_STATUS_DEGRADED = 3;
  DAEMON_STATUS_STOPPING = 4;
  DAEMON_STATUS_RUNNING = 5;
}

enum StorageStatus {
  STORAGE_STATUS_UNSPECIFIED = 0;
  STORAGE_STATUS_READY = 1;
  STORAGE_STATUS_MIGRATING = 2;
  STORAGE_STATUS_READ_ONLY = 3;
  STORAGE_STATUS_UNAVAILABLE = 4;
}

message RegisterRepositoryRequest {
  string display_name = 1;
  string root_path = 2;
  PathScope allowed_scope = 3;
  Actor requester = 4;
}

message RegisterRepositoryResponse {
  ProtocolMetadata metadata = 1;
  Repository repository = 2;
  PolicyDecision policy = 3;
}

message ListRepositoriesRequest {
  RepositoryTrustState trust_state = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListRepositoriesResponse {
  ProtocolMetadata metadata = 1;
  repeated Repository repositories = 2;
  string next_page_token = 3;
}

message Repository {
  string repository_id = 1;
  string display_name = 2;
  string root_path = 3;
  PathScope allowed_scope = 4;
  RepositoryTrustState trust_state = 5;
  // Unix epoch milliseconds.
  int64 created_at_unix_ms = 6;
  // Unix epoch milliseconds.
  int64 updated_at_unix_ms = 7;
}

enum RepositoryTrustState {
  REPOSITORY_TRUST_STATE_UNSPECIFIED = 0;
  REPOSITORY_TRUST_STATE_TRUSTED = 1;
  REPOSITORY_TRUST_STATE_READ_ONLY = 2;
  REPOSITORY_TRUST_STATE_BLOCKED = 3;
}

message PathScope {
  PathScopeKind kind = 1;
  repeated string roots = 2;
  repeated string include_patterns = 3;
  repeated string exclude_patterns = 4;
}

enum PathScopeKind {
  PATH_SCOPE_KIND_UNSPECIFIED = 0;
  PATH_SCOPE_KIND_REPOSITORY = 1;
  PATH_SCOPE_KIND_EXPLICIT_PATHS = 2;
  PATH_SCOPE_KIND_READ_ONLY = 3;
}

message GetProjectStatusRequest {
  string repository_id = 1;
  EventCursor cursor = 2;
}

message GetProjectStatusResponse {
  reserved 6, 7;
  reserved "latest_event_id", "latest_event_sequence";

  ProtocolMetadata metadata = 1;
  Repository repository = 2;
  repeated Job recent_jobs = 3;
  repeated PolicyDecision recent_policy_decisions = 4;
  EventCursor latest_cursor = 5;
  DaemonStatus daemon_status = 8;
  StorageStatus storage_status = 9;
}

message SubmitJobRequest {
  string repository_id = 1;
  Actor requester = 2;
  string kind = 3;
  string goal = 4;
  PathScope path_scope = 5;
  // Capability hints the daemon can normalize for policy and idempotency.
  // Missing or empty hint lists default to capability.discovery; blank string
  // entries are invalid.
  repeated string requested_capabilities = 6;
  string idempotency_key = 7;
}

message SubmitJobResponse {
  ProtocolMetadata metadata = 1;
  Job job = 2;
  PolicyDecision policy = 3;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  ProtocolMetadata metadata = 1;
  Job job = 2;
}

message ListJobsRequest {
  string repository_id = 1;
  JobStatus status = 2;
  Actor requester = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListJobsResponse {
  ProtocolMetadata metadata = 1;
  repeated Job jobs = 2;
  string next_page_token = 3;
}

message CancelJobRequest {
  string job_id = 1;
  Actor requester = 2;
  string reason = 3;
}

message CancelJobResponse {
  ProtocolMetadata metadata = 1;
  Job job = 2;
  JobCancellation cancellation = 3;
}

message Job {
  string job_id = 1;
  string repository_id = 2;
  Actor requester = 3;
  string kind = 4;
  string goal = 5;
  JobStatus status = 6;
  PolicySummary policy_summary = 7;
  // Unix epoch milliseconds.
  int64 created_at_unix_ms = 8;
  // Unix epoch milliseconds. Present when started.
  optional int64 started_at_unix_ms = 9;
  // Unix epoch milliseconds. Present when completed.
  optional int64 completed_at_unix_ms = 10;
  // Present when latest event has been observed.
  optional string latest_event_id = 11;
  JobCancellation cancellation = 12;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_SUCCEEDED = 3;
  JOB_STATUS_FAILED = 4;
  JOB_STATUS_BLOCKED = 5;
  JOB_STATUS_CANCELED = 6;
}

message JobCancellation {
  JobCancellationState state = 1;
  Actor requested_by = 2;
  optional string reason = 3;
  // Unix epoch milliseconds. Present when a cancellation has been requested.
  optional int64 requested_at_unix_ms = 4;
  // Unix epoch milliseconds. Present when cancellation is completed.
  optional int64 completed_at_unix_ms = 5;
}

enum JobCancellationState {
  JOB_CANCELLATION_STATE_UNSPECIFIED = 0;
  JOB_CANCELLATION_STATE_NOT_REQUESTED = 1;
  JOB_CANCELLATION_STATE_REQUESTED = 2;
  JOB_CANCELLATION_STATE_COOPERATIVE_STOP = 3;
  JOB_CANCELLATION_STATE_FORCE_STOP = 4;
  JOB_CANCELLATION_STATE_COMPLETED = 5;
}

message WatchEventsRequest {
  string repository_id = 1;
  EventCursor cursor = 2;
  repeated string subject_ids = 3;
  EventSeverity min_severity = 4;
}

message WatchEventsResponse {
  ProtocolMetadata metadata = 1;
  oneof payload {
    Event event = 2;
    ProtocolError error = 4;
  }
  EventCursor cursor = 3;
}

message EventCursor {
  // Sequence numbers are monotonically increasing per daemon store.
  uint64 sequence = 1;
  string event_id = 2;
}

message Event {
  string event_id = 1;
  uint64 sequence = 2;
  // Unix epoch milliseconds.
  int64 occurred_at_unix_ms = 3;
  EventSubject subject = 4;
  string kind = 5;
  EventSeverity severity = 6;
  string message = 7;
  EventRefs refs = 8;
}

message EventSubject {
  EventSubjectType type = 1;
  string id = 2;
}

enum EventSubjectType {
  EVENT_SUBJECT_TYPE_UNSPECIFIED = 0;
  EVENT_SUBJECT_TYPE_DAEMON = 1;
  EVENT_SUBJECT_TYPE_REPOSITORY = 2;
  EVENT_SUBJECT_TYPE_JOB = 3;
  EVENT_SUBJECT_TYPE_POLICY_DECISION = 4;
  EVENT_SUBJECT_TYPE_LOCK_DECISION = 5;
  EVENT_SUBJECT_TYPE_TOOL_INVOCATION = 6;
  EVENT_SUBJECT_TYPE_TOOL_RESULT = 7;
  EVENT_SUBJECT_TYPE_AUDIT_RECORD = 8;
}

enum EventSeverity {
  EVENT_SEVERITY_UNSPECIFIED = 0;
  EVENT_SEVERITY_DEBUG = 1;
  EVENT_SEVERITY_INFO = 2;
  EVENT_SEVERITY_WARNING = 3;
  EVENT_SEVERITY_ERROR = 4;
}

message EventRefs {
  string repository_id = 1;
  string job_id = 2;
  string policy_decision_id = 3;
  string lock_decision_id = 4;
  string tool_invocation_id = 5;
  string tool_result_id = 6;
  string audit_ref = 7;
}

message CheckPolicyRequest {
  string repository_id = 1;
  Actor requester = 2;
  string requested_capability = 3;
  string action = 4;
  PathScope path_scope = 5;
  ToolResultRef tool_result = 6;
}

message CheckPolicyResponse {
  ProtocolMetadata metadata = 1;
  PolicyDecision decision = 2;
}

message PolicyDecision {
  string decision_id = 1;
  PolicyOutcome outcome = 2;
  RiskTier risk_tier = 3;
  string requested_capability = 4;
  string reason_code = 5;
  string reason = 6;
  string approval_request_ref = 7;
  string audit_ref = 8;
}

message PolicySummary {
  string decision_id = 1;
  PolicyOutcome outcome = 2;
  RiskTier risk_tier = 3;
  string reason_code = 4;
}

enum PolicyOutcome {
  POLICY_OUTCOME_UNSPECIFIED = 0;
  POLICY_OUTCOME_ALLOWED = 1;
  POLICY_OUTCOME_AUDITED = 2;
  POLICY_OUTCOME_NEEDS_APPROVAL = 3;
  POLICY_OUTCOME_BLOCKED = 4;
}

enum RiskTier {
  RISK_TIER_UNSPECIFIED = 0;
  RISK_TIER_R0 = 1;
  RISK_TIER_R1 = 2;
  RISK_TIER_R2 = 3;
  RISK_TIER_R3 = 4;
  RISK_TIER_R4 = 5;
}

message RenderToolOutputRequest {
  ToolResultRef tool_result = 1;
  RenderFormat format = 2;
}

message RenderToolOutputResponse {
  ProtocolMetadata metadata = 1;
  ToolResultRef tool_result = 2;
  RenderFormat format = 3;
  string rendered_output = 4;
  optional string fallback_reason = 5;
}

message ToolResultRef {
  string tool_result_id = 1;
  string tool_invocation_id = 2;
  string job_id = 3;
  string repository_id = 4;
  string content_type = 5;
}

enum RenderFormat {
  RENDER_FORMAT_UNSPECIFIED = 0;
  RENDER_FORMAT_TOON = 1;
  RENDER_FORMAT_JSON = 2;
  RENDER_FORMAT_TEXT = 3;
}

message ProtocolError {
  ErrorCode code = 1;
  string reason = 2;
  bool recoverable = 3;
  RecoveryNextState next_state = 4;
  int64 retry_after_ms = 5;
  string audit_ref = 6;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_PERMISSION_DENIED = 3;
  ERROR_CODE_POLICY_BLOCKED = 4;
  ERROR_CODE_NEEDS_APPROVAL = 5;
  ERROR_CODE_CURSOR_EXPIRED = 6;
  ERROR_CODE_CONFLICT = 7;
  ERROR_CODE_UNAVAILABLE = 8;
  ERROR_CODE_INTERNAL = 9;
}

enum RecoveryNextState {
  RECOVERY_NEXT_STATE_UNSPECIFIED = 0;
  RECOVERY_NEXT_STATE_STOP = 1;
  RECOVERY_NEXT_STATE_RETRY = 2;
  RECOVERY_NEXT_STATE_RETRY_WITH_NARROWER_SCOPE = 3;
  RECOVERY_NEXT_STATE_REQUEST_APPROVAL = 4;
  RECOVERY_NEXT_STATE_REFRESH_PROJECT_STATUS = 5;
}

message Actor {
  ActorType type = 1;
  string id = 2;
  string display_name = 3;
}

enum ActorType {
  ACTOR_TYPE_UNSPECIFIED = 0;
  ACTOR_TYPE_USER = 1;
  ACTOR_TYPE_AGENT = 2;
  ACTOR_TYPE_EXTENSION = 3;
  ACTOR_TYPE_SYSTEM = 4;
}
